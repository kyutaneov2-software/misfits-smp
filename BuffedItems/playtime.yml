# ========================================
#           PlayTime+ Configuration
# ========================================
# OPTIMIZED FOR 3GB RAM SERVER - MISFITS STUDIO
# 🟣 PURPLE PREMIUM THEME - BALANCED EDITION
# ⚡ MAXIMUM OPTIMIZATION - MINIMAL SERVER LOAD
# ✨ AURASKILLS TRAITS INTEGRATION - BALANCED PROGRESSION
# 👑 SUPPORTER RANK: EVERBOUND (5% Advantage - Fair)

# ========================================
#          Time Tracking Settings
# ========================================
tracking:
  interval: 30
  live-progress: false

# ========================================
#          Anti-AFK Settings
# ========================================
anti-afk:
  enabled: true
  threshold: 180

# ========================================
#          LuckPerms Rank Integration
# ========================================
rank-progression:
  enabled: true
  remove-previous-title: true
  
  titles:
    # Free Ranks (Playtime-based)
    1min: "title_wanderer"
    4hours: "title_rooted"
    12hours: "title_delver"
    24hours: "title_artisan"
    7days: "title_seasoned"
    1month: "title_luminous"
    1.5months: "title_starbound"
    
    # Supporter Ranks (Requires 1 month playtime + purchase)
    everbound: "title_everbound"  # Available after 1 month free play + purchase
    
    # Beyond - Legendary progression
    2months: "title_starbound_elder"
    3months: "title_starbound_ancient"
    6months: "title_starbound_mythic"
    9months: "title_starbound_legend"
    12months: "title_starbound_immortal"

# ========================================
#          Milestone Rewards - TITLES + MONEY
# ========================================

milestones:
  # === STARTER PHASE ===
  1min:
    time: 60
    display-name: "1 Minute - WANDERER"
    rewards:
      - "lp user %player% parent set title_wanderer"
      - "eco give %player% 100"

  # === EARLY GAME ===
  4hours:
    time: 14400
    display-name: "4 Hours - ROOTED"
    rewards:
      - "lp user %player% parent set title_rooted"
      - "eco give %player% 500"

  12hours:
    time: 43200
    display-name: "12 Hours - DELVER"
    rewards:
      - "lp user %player% parent set title_delver"
      - "eco give %player% 1000"

  24hours:
    time: 86400
    display-name: "24 Hours - ARTISAN"
    rewards:
      - "lp user %player% parent set title_artisan"
      - "eco give %player% 2000"

  # === WEEKLY MILESTONES ===
  7days:
    time: 604800
    display-name: "7 Days - SEASONED"
    rewards:
      - "lp user %player% parent set title_seasoned"
      - "eco give %player% 5000"

  # === MONTHLY MILESTONES ===
  1month:
    time: 2592000
    display-name: "1 Month - LUMINOUS"
    rewards:
      - "lp user %player% parent set title_luminous"
      - "eco give %player% 10000"

  1.5months:
    time: 3888000
    display-name: "1.5 Months - STARBOUND"
    rewards:
      - "lp user %player% parent set title_starbound"
      - "eco give %player% 20000"

  # === SUPPORTER RANK: EVERBOUND (Requires 1 Month Playtime) ===
  everbound:
    time: 2592000
    display-name: "✨ SUPPORTER - EVERBOUND ✨"
    rewards:
      - "lp user %player% parent set title_everbound"
      - "eco give %player% 25000"   # Bonus for supporters

# ========================================
#              GUI Settings
# ========================================
gui:
  title: "&5&lᴘʟᴀʏᴛɪᴍᴇ+ &d&l| &5&lᴇᴛᴇʀɴᴀʟ"

# ========================================
#          Sound Settings
# ========================================
sounds:
  enabled: true
  milestone-sound: "ENTITY_PLAYER_LEVELUP"

# ========================================
#          Message Settings
# ========================================
messages:
  milestone-reached: "&5&l⏺ &d&lPLAYTIME REWARD &5&l⏺\n&7▸ &d%milestone%"
  
  no-permission: "&cYou don't have permission to use this command!"
  player-only: "&cThis command can only be used by players!"
  player-not-found: "&cPlayer not found!"
  playtime-reset: "&aSuccessfully reset playtime for &e%player%&a!"
  config-reloaded: "&aConfiguration reloaded successfully!"