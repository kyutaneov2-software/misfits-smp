      '2':
        potion_effects:
        - FIRE_RESISTANCE;1
        attributes:
        - GENERIC_MAX_HEALTH;ADD_NUMBER;2.0
        action-bar: '&c🔥 &lDragon''s Ember (2/5)'
      '3':
        potion_effects:
        - STRENGTH;1
        attributes:
        - GENERIC_ATTACK_DAMAGE;ADD_NUMBER;1.0
        action-bar: '&6🔥 &lDragon''s Flame (3/5)'
      '4':
        potion_effects:
        - FIRE_RESISTANCE;2
        - SPEED;1
        action-bar: '&e🔥 &lDragon''s Fury (4/5)'
      '5':
        potion_effects:
        - STRENGTH;2
        - REGENERATION;1
        attributes:
        - GENERIC_MAX_HEALTH;ADD_NUMBER;4.0
        action-bar: '&6&l🐉 DRAGONBORN ASCENDANT! (5/5)'
        boss-bar:
